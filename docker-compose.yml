volumes:
  dummy_web_bundle:
  dummy_web_db:
  scim_stub_db:
services:
  dummy-web:
    image: ruby:3.4.1@sha256:f78dc1bba60f85d40d6dc6d6722ca2cda0b5273fc179119badd0f7654d5d1d6e
    platform: linux/x86_64
    working_dir: /app/audiences/spec/dummy
    environment:
      RAILS_ENV: development
      VITE_RUBY_HOST: dummy-vite
      SCIM_V2_API: http://scim-stub:3002/api/scim/v2/
      DATABASE_HOST: mysql
    command:
      - /bin/sh
      - -c
      - |
        bundle check || bundle install
        bundle exec rails db:setup
        rm -f tmp/pids/server.pid
        bundle exec rails server --binding '0.0.0.0' --port '3000'
    ports:
      - "3000:3000"
    depends_on:
      - dummy-vite
      - scim-stub
      - mysql
    volumes:
      - .:/app
      - dummy_web_bundle:/usr/local/bundle
  dummy-vite:
    image: node:22.13.1-alpine@sha256:e2b39f7b64281324929257d0f8004fb6cb4bf0fdfb9aa8cedb235a766aec31da
    platform: linux/x86_64
    working_dir: /app/audiences/spec/dummy
    command:
      - /bin/sh
      - -c
      - |
        yarn install
        yarn dev
    ports:
      - "3036:3036"
    volumes:
      - .:/app
  scim-stub:
    image: powerhome/scim-stub@sha256:4a8e7b34337efe6efa0723bc8f90deed4143fcc18edaaf03ea80d3d34218ec86
    platform: linux/x86_64
    command:
      - /bin/sh
      - -c
      - |
        bundle exec rails db:setup
        rm -f tmp/pids/server.pid
        bundle exec rails server --binding '0.0.0.0' --port '3002'
    ports:
      - "3002:3002"
    volumes:
      - scim_stub_db:/app/db/development.sqlite3
  mysql:
    image: mysql:latest@sha256:082063dca94535c76b91c6ef9b9f6748810e546887af5e8574a8cfa11eace184
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dummy_web_db:/var/lib/mysql
